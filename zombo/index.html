<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Zombo-Korsche</title>
    <link rel="icon" type="image/x-icon" href="https://korsche.link/kirsche/kirsche_favicon.ico">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .pixel {
            height: 1px;
            width: 100%;
            background-color: #000000; /* Start with all pixels black */
            z-index: 10;
        }
        .centered-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .title-text {
            font-size: 48px;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            position: absolute;
            color: white;
            text-align: center;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
        .button-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 100px;
            z-index: 20;
        }
        .custom-button {
            background-color: blue;
            color: yellow;
            border: 3px solid yellow;
            font-size: 24px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .custom-button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <h1 class="title-text">Welcome to Zombo-Korsche</h1>
    <img src="kirsche_beach02.png" alt="Centered Image" class="centered-image">
    <div class="button-container">
        <button class="custom-button" onclick="window.location.href='https://korsche.link/bounce/index.html'">Korche Bounce</button>
        <button class="custom-button" onclick="window.location.href='https://korsche.link/kirsche/index.html'">Kirsche Gallery</button>
    </div>
    <script>
        // Function to generate random RGB color
        function getRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return [r, g, b];
        }

        function calculateGradient(sVal, eVal, step, maxSteps) {
            const ratio = step / (maxSteps - 1);
            const value = Math.floor(sVal + ratio * (eVal - sVal));
            // console.log(`Math.floor(${sVal} + ${ratio} * (${eVal} - ${sVal})) = ${value}`);
            return value;
        }

        // Get the viewport height
        const height = window.innerHeight;
        const body = document.body;
        const colorChangeInterval = Math.floor(height / 3); // Change color every one-third of document height
        
        // Create a 1px div for each pixel height
        for (let i = 0; i < height; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            body.appendChild(pixel);
        }
        
        // Track current black pixel position
        const pixels = document.querySelectorAll('.pixel');
        
        // Counter and color variables
        let counter = 0;
        let sClr = [];
        let eClr = getRandomColor();
        
        // Move the black pixel down every 0.005 seconds
        setInterval(() => {
            // When counter is 0, generate new random color
            if (counter === 0) {
                sClr = getRandomColor();
            }

            for (let i = pixels.length - 1; i > 0; i--) {
              pixels[i].style.backgroundColor = pixels[i - 1].style.backgroundColor;
            }

            if (counter === 0) {
                pixels[0].style.backgroundColor = `rgb(${eClr[0]}, ${eClr[1]}, ${eClr[2]})`;
            } else {
                const red = calculateGradient(eClr[0], sClr[0], counter, colorChangeInterval);
                const green = calculateGradient(eClr[1], sClr[1], counter, colorChangeInterval);
                const blue = calculateGradient(eClr[2], sClr[2], counter, colorChangeInterval);
                pixels[0].style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
            }
            
            // Increment counter and reset at colorChangeInterval
            counter++;
            if (counter >= colorChangeInterval) {
                counter = 0;
                eClr = sClr;
            }
        }, 5);

        const titleText = document.querySelector('.title-text');
        const titleChars = titleText.textContent.split('');
        const titleCharColors = []
        titleText.textContent = ''; // Clear the original text
        titleChars.forEach(char => {
            const span = document.createElement('span');
            const charColor = getRandomColor();
            span.textContent = char;
            span.style.color = `rgb(${charColor[0]}, ${charColor[1]}, ${charColor[2]})`;
            titleText.appendChild(span);
            titleCharColors.push(charColor); // Start with white color for each character
        });
        const titleSpans = titleText.querySelectorAll('span');
        setInterval(() => {
            titleCharColors.forEach((color, index) => {
                if (index < titleCharColors.length - 1) {
                    titleCharColors[index] = titleCharColors[index + 1]; // Shift color from the next character
                    const r = titleCharColors[index][0];
                    const g = titleCharColors[index][1];
                    const b = titleCharColors[index][2];
                    titleSpans[index].style.color = `rgb(${r}, ${g}, ${b})`;
                } else {
                    const newColor = getRandomColor();
                    titleCharColors[index] = newColor;
                    titleSpans[index].style.color = `rgb(${newColor[0]}, ${newColor[1]}, ${newColor[2]})`;
                }
            });
        }, 500);
    </script>
</body>
</html>
