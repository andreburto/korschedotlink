<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korsche.Link</title>
</head>
<body style="margin: 0; padding: 0; text-align: center; background-color: #deedee; overflow: hidden;">
  <div style="text-align: center; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <img id="kirscheImage" style="display: none;">
  </div>
  <script>
    window.image_endpoint = "https://dooo2ykm9j.execute-api.us-east-1.amazonaws.com/kirsche/hello";
    window.counter = 0;
    window.files = [];

    async function callApi() {
      const response = await fetch(window.image_endpoint, {
        method: "GET"
      });
      const data = await response.json();
      if (response.ok) {
        const files = data["files"];
        if (files && files.length > 0) {
          return files;
        } else {
          console.log("No files available in the response.");
          return [];
        }
      } else {
        console.log("API call failed:", response.statusText);
        return [];
      }
    }

    function resizeImage(img) {
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const minDimension = Math.min(viewportHeight, viewportWidth);
      
      const naturalWidth = img.naturalWidth;
      const naturalHeight = img.naturalHeight;
      const maxImageDimension = Math.max(naturalWidth, naturalHeight);
      
      const ratio = minDimension / maxImageDimension;
      
      img.style.width = (naturalWidth * ratio) + "px";
      img.style.height = (naturalHeight * ratio) + "px";
      img.style.display = "block";
      
      console.log(`Image resized: ${img.style.width} x ${img.style.height}`);
    }

    async function getImage() {
      if (window.counter >= 100 || window.files.length === 0) {
        console.log("Fetching new file list from API...");
        window.files = await callApi();
        window.counter = 0;
      }

      if (window.files.length === 0) {
        console.log("No files available to display.");
        return;
      }

      const randomIndex = Math.floor(Math.random() * window.files.length);
      const imgElement = document.getElementById("kirscheImage");
      
      imgElement.onload = function() {
        resizeImage(imgElement);
      };
      
      imgElement.src = window.files[randomIndex];
      console.log("Loading image:", window.files[randomIndex]);

      window.counter++;
    }

    // Initialize: call API immediately and start the interval
    (async function init() {
      window.files = await callApi();
      await getImage();
      setInterval(getImage, 30000);
    })();

    // Handle window resize
    window.addEventListener('resize', function() {
      const imgElement = document.getElementById("kirscheImage");
      if (imgElement.src) {
        resizeImage(imgElement);
      }
    });

    // Handle spacebar press to get new image
    window.addEventListener('keydown', function(event) {
      if (event.code === 'Space' || event.key === ' ') {
        event.preventDefault(); // Prevent page scroll
        getImage();
      }
    });
  </script>
</body>
</html>
